<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Ravona AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      :root {
        --tg-safe-area-inset-top: env(safe-area-inset-top, 0px);
        --tg-safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
      }
      body {
        font-family: 'Inter', sans-serif;
        /* Deep Blue Gradient Background */
        background: #0f172a;
        background: linear-gradient(180deg, #0f172a 0%, #172554 40%, #1e1b4b 100%);
        background-attachment: fixed;
        color: white;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        margin: 0;
        padding: 0;
        height: 100vh;
        height: 100dvh;
      }
      #root { height: 100%; width: 100%; }
      ::-webkit-scrollbar { width: 0px; display: none; }

      /* Liquid Glass Style */
      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 
          0 4px 20px rgba(0, 0, 0, 0.2),
          inset 0 0 20px rgba(255, 255, 255, 0.02);
        position: relative;
        overflow: hidden;
      }

      /* Shine Effect for Liquid feel */
      .glass-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.05),
          transparent
        );
        transition: 0.5s;
      }
      
      .glass-card:active::before {
        left: 100%;
      }

      .liquid-button {
        background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .safe-top { padding-top: var(--tg-safe-area-inset-top); }
      .safe-bottom { padding-bottom: var(--tg-safe-area-inset-bottom); }

      @keyframes slideUpPop {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      
      .animate-slide-up { animation: slideUpPop 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
      .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

      /* From Uiverse.io by Nawsome */ 
      .loader {
        --background: linear-gradient(135deg, #23C4F8, #275EFE);
        --shadow: rgba(39, 94, 254, 0.28);
        --text: #6C7486;
        --page: rgba(255, 255, 255, 0.36);
        --page-fold: rgba(255, 255, 255, 0.52);
        --duration: 3s;
        width: 200px;
        height: 140px;
        position: relative;
      }

      .loader:before, .loader:after {
        --r: -6deg;
        content: "";
        position: absolute;
        bottom: 8px;
        width: 120px;
        top: 80%;
        box-shadow: 0 16px 12px var(--shadow);
        transform: rotate(var(--r));
      }

      .loader:before {
        left: 4px;
      }

      .loader:after {
        --r: 6deg;
        right: 4px;
      }

      .loader div {
        width: 100%;
        height: 100%;
        border-radius: 13px;
        position: relative;
        z-index: 1;
        perspective: 600px;
        box-shadow: 0 4px 6px var(--shadow);
        background-image: var(--background);
      }

      .loader div ul {
        margin: 0;
        padding: 0;
        list-style: none;
        position: relative;
      }

      .loader div ul li {
        --r: 180deg;
        --o: 0;
        --c: var(--page);
        position: absolute;
        top: 10px;
        left: 10px;
        transform-origin: 100% 50%;
        color: var(--c);
        opacity: var(--o);
        transform: rotateY(var(--r));
        -webkit-animation: var(--duration) ease infinite;
        animation: var(--duration) ease infinite;
      }

      .loader div ul li:nth-child(2) {
        --c: var(--page-fold);
        -webkit-animation-name: page-2;
        animation-name: page-2;
      }

      .loader div ul li:nth-child(3) {
        --c: var(--page-fold);
        -webkit-animation-name: page-3;
        animation-name: page-3;
      }

      .loader div ul li:nth-child(4) {
        --c: var(--page-fold);
        -webkit-animation-name: page-4;
        animation-name: page-4;
      }

      .loader div ul li:nth-child(5) {
        --c: var(--page-fold);
        -webkit-animation-name: page-5;
        animation-name: page-5;
      }

      .loader div ul li svg {
        width: 90px;
        height: 120px;
        display: block;
      }

      .loader div ul li:first-child {
        --r: 0deg;
        --o: 1;
      }

      .loader div ul li:last-child {
        --o: 1;
      }

      .loader span {
        display: block;
        left: 0;
        right: 0;
        top: 100%;
        margin-top: 20px;
        text-align: center;
        color: var(--text);
      }

      @keyframes page-2 {
        0% { transform: rotateY(180deg); opacity: 0; }
        20% { opacity: 1; }
        35%, 100% { opacity: 0; }
        50%, 100% { transform: rotateY(0deg); }
      }

      @keyframes page-3 {
        15% { transform: rotateY(180deg); opacity: 0; }
        35% { opacity: 1; }
        50%, 100% { opacity: 0; }
        65%, 100% { transform: rotateY(0deg); }
      }

      @keyframes page-4 {
        30% { transform: rotateY(180deg); opacity: 0; }
        50% { opacity: 1; }
        65%, 100% { opacity: 0; }
        80%, 100% { transform: rotateY(0deg); }
      }

      @keyframes page-5 {
        45% { transform: rotateY(180deg); opacity: 0; }
        65% { opacity: 1; }
        80%, 100% { opacity: 0; }
        95%, 100% { transform: rotateY(0deg); }
      }
    </style>
  </head>
  <body class="text-white selection:bg-blue-500 selection:text-white">
    <div id="root"></div>
    <script>
      // Browser environment uchun process.env polyfill
      window.process = {
        env: {
          API_KEY: "" 
        }
      };
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
